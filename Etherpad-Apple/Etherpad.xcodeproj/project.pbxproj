			outputFileListPaths = (
			);
			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Csound's nested audio dylibs (libsndfile + codecs) live in\n# CsoundLib64.framework/Versions/Current/libs and ship UNSIGNED. Xcode's Embed &\n# Sign signs the framework bundle + main binary but NOT these loose dylibs, so\n# hardened runtime rejects them at launch (\"Trying to load an unsigned library\").\n# Sign each one with the build identity, then re-seal the framework so its seal\n# includes the now-signed dylibs.\nset -e\n[ \"${CODE_SIGNING_ALLOWED}\" = \"YES\" ] || { echo \"code signing not allowed; skipping\"; exit 0; }\n[ -n \"${EXPANDED_CODE_SIGN_IDENTITY}\" ] || { echo \"no signing identity; skipping\"; exit 0; }\nFW=\"${CODESIGNING_FOLDER_PATH}/Contents/Frameworks/CsoundLib64.framework\"\n[ -d \"$FW\" ] || { echo \"framework not embedded; skipping\"; exit 0; }\nLIBS=\"$FW/Versions/Current/libs\"\nfor dylib in \"$LIBS\"/*.dylib; do\n  [ -f \"$dylib\" ] || continue\n  codesign --force --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" --options runtime \"$dylib\"\ndone\ncodesign --force --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" --options runtime \"$FW/Versions/Current/CsoundLib64\"\ncodesign --force --sign \"${EXPANDED_CODE_SIGN_IDENTITY}\" --options runtime \"$FW\"\n";
