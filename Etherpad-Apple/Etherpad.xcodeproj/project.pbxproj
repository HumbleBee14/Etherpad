			outputPaths = (
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Vendored Csound ships without dSYMs; Xcode 16 warns on App Store upload.\n# dsymutil creates stub dSYMs (correct UUIDs, no debug info) to satisfy upload checks.\n# Archive-only so local Debug runs do not get empty-dSYM LLDB noise.\n# Stripped binaries always make dsymutil warn (missing .o paths, no debug symbols) —\n# that noise is expected; stderr is discarded because the stub dSYMs are still valid.\nset -e\n[ \"${ACTION}\" = \"install\" ] || exit 0\n[ \"${CONFIGURATION}\" = \"Release\" ] || exit 0\nFW=\"${BUILT_PRODUCTS_DIR}/${FRAMEWORKS_FOLDER_PATH}/CsoundLib64.framework\"\n[ -d \"$FW\" ] || exit 0\nOUT=\"${DWARF_DSYM_FOLDER_PATH}\"\nMAIN=\"${FW}/Versions/Current/CsoundLib64\"\nif [ -f \"$MAIN\" ]; then\n  dsymutil \"$MAIN\" -o \"${OUT}/CsoundLib64.framework.dSYM\" 2>/dev/null\nfi\nfor dylib in \"${FW}/Versions/Current/libs/\"*.dylib; do\n  [ -f \"$dylib\" ] || continue\n  dsymutil \"$dylib\" -o \"${OUT}/$(basename \"$dylib\").dSYM\" 2>/dev/null\ndone\n";
		};
		DD022EB931DD299B221F0364 /* Sign embedded Csound libraries */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputFileListPaths = (
