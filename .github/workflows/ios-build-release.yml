name: iOS Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'EtherSurface-iOS/**'
      - '.github/workflows/ios-build-release.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App for App Store
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      - name: Build Archive
        run: |
          cd EtherSurface-iOS
          mkdir -p build

          echo "🔨 Building Etherpad.xcarchive..."
          xcodebuild \
            -project Etherpad.xcodeproj \
            -scheme Etherpad \
            -configuration Release \
            -archivePath $PWD/build/Etherpad.xcarchive \
            -allowProvisioningUpdates \
            archive 2>&1 | tee build.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Archive failed!"
            exit 1
          fi

          echo "✅ Archive created successfully"
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Export IPA
        if: success()
        run: |
          cd EtherSurface-iOS

          echo "📦 Exporting IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/Etherpad.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $PWD/build/ipa 2>&1 | tee export.log

          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ Export failed!"
            exit 1
          fi

          echo "✅ IPA exported successfully"
          ls -lh $PWD/build/ipa/Etherpad.ipa
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Etherpad.ipa
          path: EtherSurface-iOS/build/ipa/Etherpad.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            EtherSurface-iOS/build.log
            EtherSurface-iOS/export.log
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          echo "✅ Build Complete!"
          echo ""
          echo "📱 IPA ready for App Store submission"
          echo "📥 Download from: Actions → Artifacts → Etherpad.ipa"
          echo "📖 Next: Follow APP_STORE_CHECKLIST.md"
