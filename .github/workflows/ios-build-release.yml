name: iOS Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'EtherSurface-iOS/**'
      - '.github/workflows/ios-build-release.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App for App Store
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Xcode
        run: |
          # Find Xcode installation
          XCODE_PATH=$(find /Applications -name "Xcode.app" -type d 2>/dev/null | head -1)
          if [ -z "$XCODE_PATH" ]; then
            echo "❌ Xcode not found!"
            exit 1
          fi
          echo "Found Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Build Archive
        run: |
          cd EtherSurface-iOS
          mkdir -p build

          echo "🔨 Building Etherpad.xcarchive..."
          xcodebuild \
            -project Etherpad.xcodeproj \
            -scheme Etherpad \
            -configuration Release \
            -archivePath $PWD/build/Etherpad.xcarchive \
            -allowProvisioningUpdates \
            -verbose \
            archive 2>&1 | tee build.log

          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Archive failed with exit code $BUILD_STATUS"
            tail -100 build.log
            exit $BUILD_STATUS
          fi

          if [ ! -d "build/Etherpad.xcarchive" ]; then
            echo "❌ Archive not created!"
            tail -100 build.log
            exit 1
          fi

          echo "✅ Archive created successfully"
          ls -lh build/Etherpad.xcarchive
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Export IPA
        if: success()
        run: |
          cd EtherSurface-iOS

          echo "📦 Exporting IPA..."
          xcodebuild \
            -exportArchive \
            -archivePath $PWD/build/Etherpad.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $PWD/build/ipa \
            -verbose \
            2>&1 | tee export.log

          EXPORT_STATUS=${PIPESTATUS[0]}
          if [ $EXPORT_STATUS -ne 0 ]; then
            echo "❌ Export failed with exit code $EXPORT_STATUS"
            tail -100 export.log
            exit $EXPORT_STATUS
          fi

          if [ ! -f "build/ipa/Etherpad.ipa" ]; then
            echo "❌ IPA not created!"
            tail -100 export.log
            exit 1
          fi

          echo "✅ IPA exported successfully"
          ls -lh build/ipa/Etherpad.ipa
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: Etherpad.ipa
          path: EtherSurface-iOS/build/ipa/Etherpad.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs
          path: |
            EtherSurface-iOS/build.log
            EtherSurface-iOS/export.log
          retention-days: 7

      - name: Summary on Success
        if: success()
        run: |
          echo "✅ Build Complete!"
          echo ""
          echo "📱 IPA ready for App Store submission"
          echo "📥 Download from: Actions → Artifacts → Etherpad.ipa"
          echo "📖 Next: Follow APP_STORE_CHECKLIST.md"

      - name: Summary on Failure
        if: failure()
        run: |
          echo "❌ Build Failed"
          echo ""
          echo "📋 Build logs uploaded as artifacts"
          echo "Check: Actions → Artifacts → build-logs"
          echo ""
          echo "Common issues:"
          echo "1. GitHub secrets not set (APPLE_ID, APPLE_ID_PASSWORD, APPLE_TEAM_ID)"
          echo "2. No provisioning profile in Apple Developer account"
          echo "3. Bundle ID mismatch (should be: com.humblebee.etherpad)"
          echo ""
          echo "📖 See IOS_DEPLOYMENT_GUIDE.md for setup instructions"
